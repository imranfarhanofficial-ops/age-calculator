<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMI Calculator</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
color:#222;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

h1{
text-align:center;
color:#2e7d32;
}

input{
width:100%;
padding:15px;
font-size:18px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:15px;
font-size:20px;
background:#2e7d32;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.card{
background:#e8f5e9;
border:1px solid #c8e6c9;
padding:20px;
margin-top:20px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>EMI Calculator</h1>

<label>Loan Amount</label>
<input type="number" id="loan" placeholder="Enter Loan Amount">

<label>Annual Interest Rate (%)</label>
<input type="number" id="rate" placeholder="Enter Interest Rate">

<label>Loan Tenure (Years)</label>
<input type="number" id="years" placeholder="Enter Years">

<button onclick="calculateEMI()">
Calculate EMI
</button>

<div id="result"></div>

</div>

<script>

function calculateEMI(){

let P = parseFloat(document.getElementById("loan").value);
let annualRate = parseFloat(document.getElementById("rate").value);
let years = parseFloat(document.getElementById("years").value);

if(!P || !annualRate || !years){
alert("Please fill all fields");
return;
}

let r = annualRate / 12 / 100;
let n = years * 12;

let emi =
(P * r * Math.pow(1+r,n)) /
(Math.pow(1+r,n)-1);

let totalPayment = emi * n;
let totalInterest = totalPayment - P;

document.getElementById("result").innerHTML =

`<div class="card">

<h2>EMI Result</h2>

<p><b>Monthly EMI:</b> ₹${emi.toFixed(2)}</p>

<p><b>Total Payment:</b> ₹${totalPayment.toFixed(2)}</p>

<p><b>Total Interest:</b> ₹${totalInterest.toFixed(2)}</p>

</div>`;
}

</script>

</body>
</html>
